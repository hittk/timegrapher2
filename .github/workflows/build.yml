name: Build KARGATHRA Timegrapher APK

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#
#   - push to ANY branch → build debug APK
#   - pull request to any branch → build debug APK
#   - push of a version tag (v*) → build signed release APK + GH Release
#   - manual run from Actions tab → build debug APK
#
# The `workflow_dispatch` trigger is important: it lets you manually kick
# off a build from the Actions tab even if no code changed, which is useful
# for testing runner/environment changes without touching source.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "**" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: {}

# ─────────────────────────────────────────────────────────────────────────────
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   KEYSTORE_BASE64      — base64-encoded .jks release keystore
#                          Generate:  keytool -genkeypair -v -keystore kargathra.jks \
#                                       -alias kargathra -keyalg RSA -keysize 2048 \
#                                       -validity 10000
#                          Encode:    base64 -i kargathra.jks | pbcopy   (macOS)
#                                     base64 kargathra.jks | xclip       (Linux)
#
#   KEYSTORE_PASSWORD    — the storePassword you set when generating the keystore
#   KEY_ALIAS            — the -alias value (e.g. "kargathra")
#   KEY_PASSWORD         — the keyPassword (often same as KEYSTORE_PASSWORD)
#
# These are only consumed on tag pushes (v*). Debug builds need no secrets.
# ─────────────────────────────────────────────────────────────────────────────

env:
  # Pin these precisely — version drift breaks Oboe prefab resolution
  NDK_VERSION:    "25.2.9519653"   # NDK r25c — required by Oboe 1.9.0
  CMAKE_VERSION:  "3.22.1"
  JAVA_VERSION:   "17"
  GRADLE_VERSION: "8.7"

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Debug APK — runs on every push and PR
  # ───────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      # ── Android SDK + NDK + CMake ──────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }} and CMake ${{ env.CMAKE_VERSION }}
        run: |
          echo "y" | sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      # ── Install Gradle directly on PATH ────────────────────────────────────
      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          set -euo pipefail
          GRADLE_ZIP="/tmp/gradle-${{ env.GRADLE_VERSION }}-bin.zip"
          curl -sSL -o "$GRADLE_ZIP" \
            "https://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip"
          sudo unzip -q "$GRADLE_ZIP" -d /opt
          echo "/opt/gradle-${{ env.GRADLE_VERSION }}/bin" >> $GITHUB_PATH

      - name: Verify Gradle install
        run: gradle --version

      # ── Bootstrap Gradle Wrapper if missing ────────────────────────────────
      - name: Bootstrap Gradle wrapper
        run: |
          if [ ! -f ./gradlew ] || [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type bin
          else
            echo "Using committed Gradle wrapper."
          fi
          chmod +x ./gradlew

      # ── Cache NDK build outputs ────────────────────────────────────────────
      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-

      # ── Cache Gradle dependencies ──────────────────────────────────────────
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kargathra-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Release APK — runs only on version tags (v*)
  # ───────────────────────────────────────────────────────────────────────────
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }} and CMake ${{ env.CMAKE_VERSION }}
        run: |
          echo "y" | sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          set -euo pipefail
          GRADLE_ZIP="/tmp/gradle-${{ env.GRADLE_VERSION }}-bin.zip"
          curl -sSL -o "$GRADLE_ZIP" \
            "https://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip"
          sudo unzip -q "$GRADLE_ZIP" -d /opt
          echo "/opt/gradle-${{ env.GRADLE_VERSION }}/bin" >> $GITHUB_PATH

      - name: Bootstrap Gradle wrapper
        run: |
          if [ ! -f ./gradlew ] || [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type bin
          fi
          chmod +x ./gradlew

      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      # ── Keystore setup ─────────────────────────────────────────────────────
      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/kargathra-release.jks

      # ── Signed release build ───────────────────────────────────────────────
      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/kargathra-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace --no-daemon

      - name: Remove keystore from runner
        if: always()
        run: rm -f ${{ github.workspace }}/kargathra-release.jks

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: kargathra-release-${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: KARGATHRA Timegrapher ${{ steps.version.outputs.VERSION }}
          body: |
            ## KARGATHRA Timegrapher ${{ steps.version.outputs.VERSION }}

            ### Install
            Download the `.apk` below and sideload onto your Pixel 8 Pro.
            Enable **Settings → Install unknown apps** for your file manager first.

            ### Built from
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
